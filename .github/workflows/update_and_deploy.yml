name: Update Data & Deploy Site

on:
  push:
    branches: [main]
  schedule:
    # Dia 1 de cada mês às 6h UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      skip_profile:
        description: 'Skip LLM API call (profile_agent)'
        type: boolean
        default: false
      github_only:
        description: 'Only run github_agent (skip LLM)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Update data via Python agents
  # ─────────────────────────────────────────────
  update-data:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.pipeline.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run update pipeline
        id: pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.skip_profile }}" = "true" ]; then
            ARGS="$ARGS --skip-profile"
          fi
          if [ "${{ inputs.github_only }}" = "true" ]; then
            ARGS="$ARGS --github-only"
          fi

          python pipelines/update_pipeline.py $ARGS | tee pipeline_output.txt

          # Parse has_changes from pipeline JSON output
          HAS_CHANGES=$(python -c "
          import json, sys
          text = open('pipeline_output.txt').read()
          start = text.find('{')
          end = text.rfind('}') + 1
          data = json.loads(text[start:end])
          print('true' if data.get('has_changes') else 'false')
          ")
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "Has changes: $HAS_CHANGES"

      - name: Commit updated data files
        if: steps.pipeline.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update data [$(date -u '+%Y-%m-%d')]"
          git push

  # ─────────────────────────────────────────────
  # Job 2: Build & Deploy Next.js to GitHub Pages
  # ─────────────────────────────────────────────
  deploy-site:
    runs-on: ubuntu-latest
    needs: update-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull latest commit (which may include the data update from job 1)
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: site
        run: npm install

      - name: Build Next.js static site
        working-directory: site
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
